<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>酒とアテ あたら夜 | 京都・四条大宮の日本酒居酒屋</title>
<meta name="description" content="京都・四条大宮の日本酒居酒屋「あたら夜」。明けてしまうのが惜しいほど素晴らしい夜を。日本酒と小皿料理を500円から気軽にお楽しみいただけます。一人飲み歓迎。" />
<meta name="keywords" content="京都, 居酒屋, 日本酒, 四条大宮, 一人飲み, カウンター, あたら夜" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+Unicase:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --ink: #14141a;
    --ink-soft: #2d2d36;
    --indigo: #1a1a2e;
    --paper: #f5f1e8;
    --paper-2: #ebe5d6;
    --paper-3: #ddd4bf;
    --sumi: #1a1a1a;
    --tea: #8b6f47;
    --gold: #b89968;
    --vermilion: #a23a2e;
    --line: rgba(20,20,26,0.18);
    --line-soft: rgba(20,20,26,0.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:"Noto Serif JP","Shippori Mincho",serif;font-weight:300;line-height:1.85;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{
    /* subtle washi grain */
    background-image:
      radial-gradient(rgba(80,60,30,0.035) 1px, transparent 1.5px),
      radial-gradient(rgba(80,60,30,0.025) 1px, transparent 1.5px),
      linear-gradient(180deg, var(--paper) 0%, var(--paper) 100%);
    background-size: 7px 7px, 13px 13px, 100% 100%;
    background-position: 0 0, 3px 4px, 0 0;
  }
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  ::selection{background:var(--ink);color:var(--paper)}

  /* utility tokens */
  .mincho{font-family:"Shippori Mincho",serif}
  .serif-en{font-family:"Cormorant Garamond",serif;letter-spacing:.04em}
  .vert{writing-mode:vertical-rl;text-orientation:mixed}
  .container{max-width:1240px;margin:0 auto;padding:0 32px}
  @media (max-width:720px){.container{padding:0 22px}}

  /* hairline gold rule */
  .rule-gold{display:block;width:1px;height:80px;background:linear-gradient(180deg,transparent,var(--gold),transparent)}

  /* 落款 seal */
  .seal{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;background:#9a2e26;color:#f5f1e8;font-family:"Shippori Mincho",serif;font-weight:700;letter-spacing:.04em;line-height:1;border-radius:3px;box-shadow:inset 0 0 0 2px #f5f1e8, inset 0 0 0 3px #9a2e26;font-size:14px;transform:rotate(-2deg)}

  /* fade in on scroll */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 1.1s cubic-bezier(.2,.7,.2,1),transform 1.1s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
  .reveal-delay-1{transition-delay:.12s}
  .reveal-delay-2{transition-delay:.24s}
  .reveal-delay-3{transition-delay:.36s}
  .reveal-delay-4{transition-delay:.48s}

  /* section eyebrow */
  .eyebrow{display:inline-flex;align-items:baseline;gap:14px;font-family:"Cormorant Garamond",serif;letter-spacing:.42em;text-transform:uppercase;font-size:11px;color:var(--ink-soft)}
  .eyebrow::before{content:"";width:42px;height:1px;background:var(--gold);align-self:center}

  .h-jp{font-family:"Shippori Mincho",serif;font-weight:500;letter-spacing:.16em;line-height:1.4}

  /* nav */
  .nav{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:18px 32px;mix-blend-mode:normal;transition:background .5s,backdrop-filter .5s,border-color .5s,padding .5s;border-bottom:1px solid transparent}
  .nav.scrolled{background:rgba(245,241,232,.86);backdrop-filter:blur(14px);border-bottom-color:var(--line-soft);padding:12px 32px}
  .nav-mark{display:flex;align-items:center;gap:12px;font-family:"Shippori Mincho",serif;font-weight:600;letter-spacing:.32em;font-size:13px}
  .nav-mark .dot{width:6px;height:6px;background:var(--vermilion);border-radius:1px;transform:rotate(45deg)}
  .nav ul{display:flex;gap:34px;list-style:none;margin:0;padding:0;font-family:"Shippori Mincho",serif;font-size:13px;letter-spacing:.22em}
  .nav ul a{position:relative;padding-bottom:4px;transition:color .3s}
  .nav ul a:hover{color:var(--vermilion)}
  .nav ul a::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1px;background:var(--vermilion);transition:right .4s}
  .nav ul a:hover::after{right:0}
  .nav-en{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;letter-spacing:.18em;color:var(--ink-soft)}
  @media (max-width:860px){.nav ul{display:none}.nav-en{display:none}}

  /* hero */
  .hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;overflow:hidden;padding:120px 0 100px}
  .hero-bg{position:absolute;inset:0;z-index:0;background-image:url("assets/exterior.jpg");background-size:cover;background-position:center;filter:grayscale(.5) brightness(.38) contrast(1.08) blur(3px);transform:scale(1.08)}
  .hero-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 45%, rgba(245,241,232,.55) 0%, rgba(245,241,232,.78) 45%, rgba(245,241,232,.95) 100%)}
  .hero-koshi{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.14;background-image:repeating-linear-gradient(90deg, transparent 0 38px, rgba(20,20,26,.55) 38px 39px)}
  /* big ghosted brushwork backdrop */
  .hero-backdrop{position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);z-index:1;font-family:"Shippori Mincho",serif;font-weight:500;font-size:clamp(280px, 38vw, 520px);line-height:.85;letter-spacing:-.04em;color:var(--ink);opacity:.05;white-space:nowrap;pointer-events:none;user-select:none}
  /* vertical rule frame */
  .hero-frame{position:absolute;inset:32px;z-index:1;pointer-events:none;border:1px solid rgba(20,20,26,.10)}
  .hero-frame::before,.hero-frame::after{content:"";position:absolute;background:rgba(20,20,26,.18)}
  .hero-frame::before{left:50%;top:0;width:1px;height:24px}
  .hero-frame::after{left:50%;bottom:0;width:1px;height:24px}
  /* corner crosshairs */
  .hero-cross{position:absolute;width:14px;height:14px;z-index:2;pointer-events:none}
  .hero-cross::before,.hero-cross::after{content:"";position:absolute;background:var(--vermilion)}
  .hero-cross::before{left:50%;top:0;width:1px;height:100%;transform:translateX(-.5px)}
  .hero-cross::after{top:50%;left:0;width:100%;height:1px;transform:translateY(-.5px)}
  .hero-cross.tl{left:24px;top:24px}.hero-cross.tr{right:24px;top:24px}
  .hero-cross.bl{left:24px;bottom:24px}.hero-cross.br{right:24px;bottom:24px}

  .hero-inner{position:relative;z-index:3;display:grid;grid-template-columns:1fr auto 1fr;gap:50px;align-items:center;max-width:1320px;margin:0 auto;padding:0 64px;width:100%}
  .hero-logo-wrap{position:relative;justify-self:center;overflow:visible;display:inline-block}
  .hero-logo{display:block;width:min(580px, 50vw);max-width:580px;height:auto;mix-blend-mode:multiply;filter:contrast(1.08);margin-bottom:-18%;clip-path:inset(0 0 18% 0)}
  /* small chops above & below the logo */
  .hero-logo-chip{position:absolute;left:50%;transform:translateX(-50%);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.5em;color:var(--ink-soft);white-space:nowrap;text-transform:uppercase;display:flex;align-items:center;gap:14px}
  .hero-logo-chip.top{top:-26px}
  .hero-logo-chip.bot{bottom:-22px;color:var(--vermilion);font-family:"Shippori Mincho",serif;font-style:normal;font-size:11px;letter-spacing:.5em}
  .hero-logo-chip .rule{display:inline-block;width:36px;height:1px;background:currentColor;opacity:.5}

  /* vertical text columns — left and right of the logo */
  .hero-vert{display:flex;flex-direction:row-reverse;gap:18px;align-items:flex-start;justify-self:end}
  .hero-vert.r{flex-direction:row;justify-self:start;align-items:flex-end}
  .hero-vert .line{font-family:"Shippori Mincho",serif;font-weight:500;writing-mode:vertical-rl;text-orientation:mixed;font-size:22px;letter-spacing:.42em;line-height:2.2;color:var(--ink);position:relative}
  .hero-vert .line.lead{font-size:26px;letter-spacing:.38em;font-weight:600}
  .hero-vert .line.sm{font-size:12px;letter-spacing:.65em;color:var(--ink-soft);font-weight:400}
  .hero-vert .line .em{color:inherit}
  /* numeric marker on the right column */
  .hero-num{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;letter-spacing:.18em;color:var(--ink-soft);writing-mode:horizontal-tb;display:flex;flex-direction:column;align-items:center;gap:6px;align-self:flex-start;margin-top:6px}
  .hero-num b{font-family:"Cormorant Unicase",serif;font-style:normal;font-weight:500;font-size:34px;color:var(--ink);letter-spacing:0;line-height:1}
  .hero-num .lbl{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--ink-soft)}
  .hero-num .rule{width:1px;height:30px;background:var(--gold)}

  .hero-meta{position:absolute;bottom:50px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:flex-end;z-index:3;font-family:"Shippori Mincho",serif;font-size:14px;letter-spacing:.28em;color:var(--ink);font-weight:500}
  .hero-meta .open-tag{display:inline-flex;align-items:center;gap:10px;font-family:"Shippori Mincho",serif;letter-spacing:.36em;font-size:12px;color:var(--ink)}
  .hero-meta .open-tag::before{content:"";width:8px;height:8px;background:var(--vermilion);border-radius:50%;animation:pulse 2.4s ease-in-out infinite}
  .hero-meta .issue{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.3em;color:var(--ink-soft)}
  .hero-meta .issue b{font-style:normal;font-weight:500;color:var(--ink)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
  .scroll-arrow{position:absolute;left:50%;bottom:50px;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--ink);opacity:.7}
  .scroll-arrow .label{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.4em;text-transform:uppercase}
  .scroll-arrow .stroke{width:1px;height:48px;background:linear-gradient(180deg,var(--ink),transparent);animation:scroll-pulse 2.6s ease-in-out infinite}
  @keyframes scroll-pulse{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
  /* ken-burns subtle drift */
  @keyframes hero-drift{0%,100%{transform:scale(1.08) translate(0,0)}50%{transform:scale(1.12) translate(-1.2%,-.6%)}}
  .hero-bg{animation:hero-drift 22s ease-in-out infinite}

  @media (max-width:820px){
    .hero{min-height:auto;padding:96px 0 60px}
    .hero-inner{grid-template-columns:1fr;gap:14px;padding:0 22px;text-align:center}
    .hero-vert,.hero-vert.r{justify-self:center;flex-direction:column;align-items:center;gap:6px}
    .hero-vert .line{writing-mode:horizontal-tb;font-size:14px;letter-spacing:.18em;line-height:1.7;text-align:center}
    .hero-vert .line.lead{font-size:17px;letter-spacing:.14em;font-weight:700}
    .hero-vert .line.sm{font-size:11px;letter-spacing:.32em}
    .hero-logo{width:min(280px,72vw);margin-bottom:0;clip-path:none}
    .hero-meta{position:static;flex-direction:column;gap:6px;align-items:center;font-size:10px;letter-spacing:.18em;margin-top:18px;padding:0 22px}
    .hero-frame{inset:10px}
    .hero-cross{display:none}
    .hero-num{display:none}
    .hero-backdrop{font-size:200px;opacity:.04}
    .scroll-arrow{display:none}
  }

  /* concept */
  .concept{position:relative;padding:160px 0;background:linear-gradient(180deg, var(--paper) 0%, #efe9da 100%)}
  .concept .container{display:grid;grid-template-columns:auto auto;gap:80px;align-items:center;justify-content:center}
  .concept .quote{position:relative;font-family:"Shippori Mincho",serif;font-weight:400;font-size:22px;line-height:2.4;letter-spacing:.1em;color:var(--ink)}
  .concept .quote::before{content:"";position:absolute;left:-26px;top:6px;width:2px;height:64px;background:var(--vermilion)}
  .concept .quote em{font-style:normal;background:linear-gradient(transparent 65%, rgba(184,153,104,.35) 65%);padding:0 2px}
  .concept .signature{margin-top:46px;display:flex;align-items:center;gap:20px;font-family:"Shippori Mincho",serif;font-size:14px;letter-spacing:.2em;color:var(--ink-soft)}
  .concept-eng{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:18px;line-height:1.7;color:var(--ink-soft);margin-top:30px;max-width:34ch}
  .concept-headline{display:flex;flex-direction:column;gap:18px;align-items:flex-start;justify-self:start}
  .concept-headline h2{font-family:"Shippori Mincho",serif;font-weight:500;font-size:clamp(54px, 7.5vw, 108px);line-height:1.1;letter-spacing:.04em;margin:0;text-align:left;color:var(--ink)}
  .concept-headline h2 span.acc{color:var(--vermilion)}
  .concept-headline .ata-en{font-family:"Cormorant Unicase",serif;font-size:14px;letter-spacing:.6em;color:var(--ink-soft)}
  /* per-line ink-brushed reveal */
  .concept-headline h2 .ln{display:inline-block;overflow:hidden}
  .concept-headline h2 .ln > span{display:inline-block;transform:translateY(110%);opacity:0;transition:transform 1.4s cubic-bezier(.2,.7,.15,1), opacity 1.2s ease}
  .reveal.in .concept-headline h2 .ln > span,
  .concept-headline.reveal.in h2 .ln > span{transform:none;opacity:1}
  .concept-headline.reveal.in h2 .ln:nth-child(1) > span{transition-delay:.1s}
  .concept-headline.reveal.in h2 .ln:nth-child(3) > span{transition-delay:.4s}
  .concept-headline.reveal.in h2 .ln:nth-child(5) > span{transition-delay:.7s}
  /* gentle drifting wash */
  .concept-headline h2 span.acc::after{
    content:"";position:absolute;inset:0;pointer-events:none;
  }
  .concept-headline h2 span.acc{position:relative;display:inline-block}
  .concept-headline.reveal.in h2 span.acc{animation:sumi-breathe 4.4s ease-in-out 1.2s infinite}
  @keyframes sumi-breathe{
    0%,100%{filter:none;transform:none}
    50%{filter:drop-shadow(0 4px 14px rgba(162,58,46,.25));transform:translateY(-2px)}
  }
  @media (max-width:820px){
    .concept{padding:60px 0}
    .concept .container{grid-template-columns:1fr;gap:28px}
    .concept-headline{align-items:flex-start;justify-self:start;gap:10px}
    .concept-headline h2{text-align:left;font-size:42px;line-height:1.18}
    .concept .quote{font-size:15px;line-height:1.95;letter-spacing:.04em}
    .concept .quote::before{display:none}
    .concept .signature{margin-top:22px;font-size:13px}
    .concept-eng{font-size:14px;line-height:1.6;margin-top:18px}
  }

  /* features 3 columns */
  .features{padding:120px 0;background:var(--paper)}
  .features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .feature{padding:56px 36px;border-right:1px solid var(--line);position:relative;transition:background .5s}
  .feature:last-child{border-right:none}
  .feature:hover{background:rgba(184,153,104,.06)}
  .feature .num{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;letter-spacing:.2em;color:var(--gold)}
  .feature h3{font-family:"Shippori Mincho",serif;font-weight:600;font-size:24px;letter-spacing:.12em;margin:18px 0 14px;line-height:1.5}
  .feature p{font-size:14px;line-height:2;color:var(--ink-soft);margin:0}
  .feature .glyph{margin-top:32px;font-family:"Shippori Mincho",serif;font-weight:600;font-size:48px;color:var(--ink);opacity:.12;line-height:1}
  @media (max-width:820px){
    .features{padding:64px 0}
    .features-grid{grid-template-columns:1fr;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .feature{display:grid;grid-template-columns:56px 1fr;column-gap:18px;row-gap:6px;padding:22px 4px;border-right:none;border-bottom:1px solid var(--line)}
    .feature:last-child{border-bottom:none}
    .feature .num{grid-column:1;grid-row:1 / span 2;align-self:start;padding-top:4px;font-size:14px}
    .feature h3{grid-column:2;grid-row:1;margin:0;font-size:17px;letter-spacing:.08em;line-height:1.45}
    .feature p{grid-column:2;grid-row:2;font-size:13px;line-height:1.85}
    .feature .glyph{display:none}
  }

  /* sake & ate */
  .menu{position:relative;padding:160px 0 140px;background:#15151c;color:var(--paper);overflow:hidden}
  .menu::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg, transparent 0 60px, rgba(245,241,232,.04) 60px 61px);pointer-events:none}
  .menu .container{position:relative;z-index:1}
  .menu-head{display:grid;grid-template-columns:1fr auto;align-items:end;gap:40px;margin-bottom:80px}
  .menu-head h2{font-family:"Shippori Mincho",serif;font-weight:400;font-size:clamp(56px, 7vw, 96px);line-height:1;letter-spacing:.04em;margin:14px 0 0;color:var(--paper)}
  .menu-head h2 .pause{display:inline-block;width:28px}
  .menu-head h2 em{font-style:normal;color:var(--gold)}
  .menu-head .lede{max-width:34ch;font-size:16px;line-height:1.95;color:rgba(245,241,232,.78);text-align:right;font-weight:500;margin:14px 0 0}
  .menu-head h2 .brk-pc{display:inline}
  @media (max-width:820px){
    .menu{padding:80px 0 80px}
    .menu-head{grid-template-columns:1fr;gap:14px;margin-bottom:40px;align-items:start}
    .menu-head h2{font-size:30px;line-height:1.35;letter-spacing:.02em;margin-top:10px}
    .menu-head h2 .brk-pc{display:none}
    .menu-head .lede{text-align:left;font-size:14px;line-height:1.95;max-width:none;margin:0}
  }

  /* Marquee — two rows scrolling in opposite directions */
  .marquee{position:relative;display:flex;flex-direction:column;gap:18px;margin:0 -32px;padding:0;overflow:hidden}
  .marquee::before,.marquee::after{content:"";position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none}
  .marquee::before{left:0;background:linear-gradient(90deg,#15151c 0%,rgba(21,21,28,0) 100%)}
  .marquee::after{right:0;background:linear-gradient(270deg,#15151c 0%,rgba(21,21,28,0) 100%)}

  .m-row{display:flex;width:max-content;gap:18px;will-change:transform}
  .m-row.row-1{animation:marqueeL 60s linear infinite}
  .m-row.row-2{animation:marqueeR 70s linear infinite}
  .marquee:hover .m-row{animation-play-state:paused}

  .m-tile{flex:0 0 auto;width:300px;height:380px;overflow:hidden;background:#222;position:relative}
  .m-tile img{width:100%;height:100%;object-fit:cover;filter:saturate(.92) brightness(.96);transition:transform 1.2s cubic-bezier(.2,.7,.2,1),filter .6s}
  .m-tile:hover img{transform:scale(1.06);filter:saturate(1.05) brightness(1.02)}

  /* alternate sizes for visual rhythm */
  .m-tile.tall{width:280px;height:400px}
  .m-tile.wide{width:380px;height:340px}
  .m-tile.sq{width:340px;height:340px}

  @keyframes marqueeL{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }
  @keyframes marqueeR{
    0%{transform:translateX(-50%)}
    100%{transform:translateX(0)}
  }

  @media (max-width:820px){
    .marquee{margin:0 -22px}
    .m-tile{width:220px;height:280px}
    .m-tile.tall{width:200px;height:300px}
    .m-tile.wide{width:280px;height:240px}
    .m-tile.sq{width:240px;height:240px}
  }

  .menu-foot{margin-top:60px;display:flex;justify-content:space-between;align-items:center;gap:30px;flex-wrap:wrap;padding-top:30px;border-top:1px solid rgba(245,241,232,.16)}
  .menu-foot .note{font-size:13px;letter-spacing:.1em;color:rgba(245,241,232,.7);max-width:60ch;line-height:2}

  /* sake row */
  .sake-row{padding:120px 0;background:#0f0f15;color:var(--paper)}

// ---------- Reveal-on-scroll hook ----------
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) {e.target.classList.add("in");io.unobserve(e.target);}});
    }, { threshold: .12, rootMargin: "0px 0px -8% 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

// ---------- Tweaks panel (in-design) ----------
function TweaksPanel() {
  const [active, setActive] = useState(false);
  const [vals, setVals] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setActive(true);
      if (e.data.type === "__deactivate_edit_mode") setActive(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // apply effects
  useEffect(() => {
    const root = document.documentElement;
    const accents = {
      vermilion: "#a23a2e", indigo: "#1a1a2e", gold: "#b89968", sumi: "#14141a"
    };
    root.style.setProperty("--vermilion", accents[vals.accent] || "#a23a2e");

    // heading font
    document.querySelectorAll(".mincho, .h-jp, h2, h3, .nav-mark, .hero-vert .line, .scene h3, .feature h3, footer .brand-jp").
    forEach((el) => el.style.fontFamily = `"${vals.headingFont}", serif`);

    // dark menu
    const m = document.querySelector(".menu");
    if (m) {
      if (vals.darkMenu) {m.style.background = "#15151c";m.style.color = "var(--paper)";} else
      {m.style.background = "var(--paper)";m.style.color = "var(--ink)";}
    }
    // lattice
    document.querySelectorAll(".hero-koshi, .menu::before").
    forEach(() => {}); // noop, koshi controlled below
    const koshi = document.querySelector(".hero-koshi");
    if (koshi) koshi.style.display = vals.showLattice ? "block" : "none";

    // seal
    document.querySelectorAll(".seal").forEach((el) => el.style.display = vals.showSeal ? "inline-flex" : "none");
  }, [vals]);

  function set(k, v) {
    const next = { ...vals, [k]: v };
    setVals(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  }
  function close() {
    setActive(false);
    window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*");
  }

  if (!active) return null;

  const accentSwatches = [
  { id: "vermilion", label: "朱", hex: "#a23a2e" },
  { id: "indigo", label: "紺", hex: "#1a1a2e" },
  { id: "gold", label: "金", hex: "#b89968" },
  { id: "sumi", label: "墨", hex: "#14141a" }];

  const fonts = ["Shippori Mincho", "Noto Serif JP", "Cormorant Garamond"];

  return (
    <div style={{
      position: "fixed", right: 24, bottom: 24, width: 280, background: "#15151c", color: "#f5f1e8",
      border: "1px solid rgba(245,241,232,.18)", padding: "22px 22px 24px", zIndex: 100,
      fontFamily: '"Shippori Mincho", serif', boxShadow: "0 30px 80px rgba(0,0,0,.5)"
    }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <div style={{ fontSize: 13, letterSpacing: ".4em" }}>TWEAKS</div>
          <button onClick={close} style={{ background: "none", border: "none", color: "#f5f1e8", cursor: "pointer", fontSize: 18, lineHeight: 1 }}>×</button>
        </div>

        <div style={{ fontSize: 11, letterSpacing: ".3em", color: "#b89968", marginBottom: 8 }}>ACCENT</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          {accentSwatches.map((s) =>
        <button key={s.id} onClick={() => set("accent", s.id)} style={{
          width: 50, height: 36, background: s.hex, border: vals.accent === s.id ? "2px solid #f5f1e8" : "1px solid rgba(245,241,232,.2)",
          cursor: "pointer", color: "#f5f1e8", fontSize: 11, fontFamily: '"Shippori Mincho",serif', letterSpacing: ".15em"
        }}>{s.label}</button>
        )}
        </div>

        <div style={{ fontSize: 11, letterSpacing: ".3em", color: "#b89968", marginBottom: 8 }}>HEADING</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18 }}>
          {fonts.map((f) =>
        <button key={f} onClick={() => set("headingFont", f)} style={{
          padding: "8px 10px", background: vals.headingFont === f ? "rgba(184,153,104,.2)" : "transparent",
          border: "1px solid rgba(245,241,232,.18)", color: "#f5f1e8", cursor: "pointer",
          fontFamily: `"${f}", serif`, fontSize: 13, letterSpacing: ".15em", textAlign: "left"
        }}>{f}</button>
        )}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {[
        ["darkMenu", "料理セクションを暗く"],
        ["showLattice", "格子模様を表示"],
        ["showSeal", "落款印を表示"]].
        map(([k, label]) =>
        <label key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, letterSpacing: ".15em", cursor: "pointer" }}>
              <span>{label}</span>
              <span onClick={() => set(k, !vals[k])} style={{
            width: 34, height: 18, borderRadius: 9, background: vals[k] ? "#b89968" : "rgba(245,241,232,.2)",
            position: "relative", transition: "background .3s"
          }}>
                <span style={{
              position: "absolute", top: 2, left: vals[k] ? 18 : 2, width: 14, height: 14, borderRadius: "50%", background: "#f5f1e8", transition: "left .3s"
            }}></span>
              </span>
            </label>
        )}
        </div>
      </div>);

}
